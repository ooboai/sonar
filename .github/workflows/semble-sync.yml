name: Semble Sync Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:

jobs:
  check-semble:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone semble
        run: git clone --depth 50 https://github.com/MinishLab/semble.git /tmp/semble

      - name: Check for upstream changes
        id: check-semble
        run: |
          cd /tmp/semble

          SEMBLE_COMMIT=$(git log -1 --format=%H)
          SEMBLE_DATE=$(git log -1 --format=%ci)
          echo "semble_commit=$SEMBLE_COMMIT" >> "$GITHUB_OUTPUT"
          echo "semble_date=$SEMBLE_DATE" >> "$GITHUB_OUTPUT"

          # Read our last-known commit (if tracked)
          LAST_KNOWN=""
          if [ -f "$GITHUB_WORKSPACE/.semble-sync-state" ]; then
            LAST_KNOWN=$(cat "$GITHUB_WORKSPACE/.semble-sync-state")
          fi

          if [ "$SEMBLE_COMMIT" = "$LAST_KNOWN" ]; then
            echo "No changes since last sync."
            echo "changes_detected=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changes_detected=true" >> "$GITHUB_OUTPUT"

          # Files we care about — the core algorithm and ranking pipeline
          WATCHED_PATHS=(
            "semble/search.py"
            "semble/types.py"
            "semble/tokens.py"
            "semble/utils.py"
            "semble/ranking/weighting.py"
            "semble/ranking/boosting.py"
            "semble/ranking/penalties.py"
            "semble/chunking/chunking.py"
            "semble/chunking/core.py"
            "semble/index/index.py"
            "semble/index/create.py"
            "semble/index/dense.py"
            "semble/index/sparse.py"
            "semble/index/files.py"
            "semble/index/file_walker.py"
            "semble/mcp.py"
            "semble/cli.py"
          )

          # Diff range: if we have a last-known commit, diff from there.
          # Otherwise just show the latest commit's changes.
          if [ -n "$LAST_KNOWN" ]; then
            DIFF_RANGE="${LAST_KNOWN}..HEAD"
          else
            DIFF_RANGE="HEAD~10..HEAD"
          fi

          CHANGED_FILES=$(git diff --name-only "$DIFF_RANGE" 2>/dev/null || git diff --name-only HEAD~1)

          # Filter to watched paths
          RELEVANT_CHANGES=""
          for watched in "${WATCHED_PATHS[@]}"; do
            if echo "$CHANGED_FILES" | grep -q "^${watched}$"; then
              RELEVANT_CHANGES="${RELEVANT_CHANGES}\n- ${watched}"
            fi
          done

          # Check for new Python files we might not have ported
          NEW_FILES=$(git diff --name-only --diff-filter=A "$DIFF_RANGE" 2>/dev/null | grep '\.py$' | grep -v '__pycache__' | grep -v 'test' || true)
          NEW_RELEVANT=""
          for f in $NEW_FILES; do
            if echo "$f" | grep -qE '^semble/(search|ranking|chunking|index|types|tokens|utils)'; then
              NEW_RELEVANT="${NEW_RELEVANT}\n- ${f} (NEW)"
            fi
          done

          # Extract key constants for drift detection
          echo "--- Constant Snapshot ---" > /tmp/constants.txt
          grep -n 'RRF_K\|CANDIDATE_COUNT\|ALPHA_SYMBOL\|ALPHA_NL' semble/search.py >> /tmp/constants.txt 2>/dev/null || true
          grep -n 'DEFINITION_BOOST\|STEM_BOOST\|FILE_COHERENCE' semble/ranking/boosting.py >> /tmp/constants.txt 2>/dev/null || true
          grep -n 'STRONG_PENALTY\|MODERATE_PENALTY\|MILD_PENALTY\|FILE_SATURATION' semble/ranking/penalties.py >> /tmp/constants.txt 2>/dev/null || true
          grep -n 'DESIRED_CHUNK_LENGTH' semble/chunking/chunking.py >> /tmp/constants.txt 2>/dev/null || true

          # Build the report
          cat > /tmp/semble-diff-report.md << 'REPORT_EOF'
          ## Semble Upstream Sync Report

          REPORT_EOF

          {
            echo "**Semble commit:** \`${SEMBLE_COMMIT}\`"
            echo "**Date:** ${SEMBLE_DATE}"
            echo ""

            if [ -n "$RELEVANT_CHANGES" ]; then
              echo "### Changed files (algorithm-relevant)"
              echo -e "$RELEVANT_CHANGES"
              echo ""
            else
              echo "### Changed files"
              echo "No changes to watched algorithm files."
              echo ""
            fi

            if [ -n "$NEW_RELEVANT" ]; then
              echo "### New files (may need porting)"
              echo -e "$NEW_RELEVANT"
              echo ""
            fi

            echo "### Current constants"
            echo '```'
            cat /tmp/constants.txt
            echo '```'
            echo ""
            echo "### Action items"
            echo "1. Compare constants above against \`PLAN.md\` key constants table"
            echo "2. Review changed files for logic updates"
            echo "3. Port any new files or changed behavior"
            echo "4. Run parity tests: \`python benchmarks/parity_test.py /path/to/repo\`"
            echo "5. Update \`.semble-sync-state\` with: \`${SEMBLE_COMMIT}\`"
          } >> /tmp/semble-diff-report.md

      - name: Create issue if changes found
        if: steps.check-semble.outputs.changes_detected == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "semble sync: upstream changes detected (${{ steps.check-semble.outputs.semble_date }})"
          content-filepath: /tmp/semble-diff-report.md
          labels: semble-sync
